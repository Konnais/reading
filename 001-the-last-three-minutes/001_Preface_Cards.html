<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>The Last Three Minutes — Preface 词卡</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');

  :root {
    --bg: #f2ede6;
    --paper: #fdfaf6;
    --card-bg: #faf7f2;
    --card-known: #f0f5ef;
    --card-unknown: #faf0f0;
    --text: #2c2416;
    --text-mid: #6b5d4e;
    --text-muted: #a8967e;
    --accent: #7a4f2e;
    --accent-light: #c4956a;
    --border: #e2d8cc;
    --border-dark: #c8b89e;
    --border-known: #a8d4a0;
    --border-unknown: #d4a8a8;
    --known-color: #4a7a44;
    --unknown-color: #7a4444;
    --known-bg: #eef5ec;
    --shadow: rgba(60, 35, 10, 0.08);
    --overlay-bg: rgba(42, 36, 32, 0.38);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg); color: var(--text);
    font-family: 'Crimson Pro', 'Noto Serif SC', 'STSong', Georgia, serif;
    min-height: 100%;
  }

  /* ── Header ── */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 54px; background: var(--paper);
    border-bottom: 1px solid var(--border-dark);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px; gap: 8px;
  }
  #header h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 13px; font-weight: 400; font-style: italic;
    color: var(--accent); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    flex: 1; min-width: 0;
  }
  .hdr-btn {
    padding: 5px 10px; border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent; font-family: inherit;
    font-size: 11px; color: var(--text-mid);
    cursor: pointer; white-space: nowrap;
    transition: all 0.15s; -webkit-appearance: none;
    flex-shrink: 0;
  }
  .hdr-btn:active { background: var(--bg); border-color: var(--border-dark); }
  .hdr-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Filter bar ── */
  #filters {
    position: fixed; top: 54px; left: 0; right: 0; z-index: 100;
    height: 40px; background: var(--paper);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px; padding: 0 14px;
  }
  .filter-btn {
    padding: 4px 12px; border-radius: 14px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text-mid);
    font-family: inherit; font-size: 11px;
    cursor: pointer; transition: all 0.18s; -webkit-appearance: none;
  }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }

  /* ── Stats ── */
  #stats-row {
    position: fixed; top: 94px; left: 0; right: 0; z-index: 99;
    height: 30px; background: var(--bg);
    display: flex; align-items: center;
    padding: 0 16px; gap: 16px;
    border-bottom: 1px solid var(--border);
  }
  .stat-item { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
  .stat-dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-known { background: var(--known-color); }
  .dot-unknown { background: var(--unknown-color); }
  .dot-fresh { background: var(--border-dark); }

  /* ── Grid ── */
  #grid-container {
    position: fixed; top: 124px; left: 0; right: 0; bottom: 0;
    overflow-y: auto; overflow-x: hidden;
    padding: 10px 10px 28px;
    -webkit-overflow-scrolling: touch;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 7px;
  }

  /* ── Card ── */
  .card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 10px 10px;
    cursor: pointer;
    transition: transform 0.14s, border-color 0.18s, background 0.18s, opacity 0.18s;
    min-height: 76px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative;
    user-select: none; -webkit-user-select: none;
    box-shadow: 0 1px 3px var(--shadow);
  }
  .card:active { transform: scale(0.95); }
  .card.known { background: var(--card-known); border-color: var(--border-known); opacity: 0.62; }
  .card.unknown { background: var(--card-unknown); border-color: var(--border-unknown); }

  .card-word {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 15px; font-weight: 700;
    color: var(--text); line-height: 1.2;
  }
  .card.known .card-word { color: var(--text-muted); font-weight: 400; }

  .card-bottom { margin-top: 6px; }
  .card-pos { font-size: 10px; color: var(--text-muted); font-style: italic; line-height: 1.3; }
  .card-zh { font-size: 11px; color: var(--accent); line-height: 1.3; margin-top: 2px; }
  .card.known .card-zh { color: var(--text-muted); }

  /* word-only mode */
  body.word-only .card-bottom { display: none; }
  body.word-only .card { min-height: 52px; justify-content: center; }

  .card-status { position: absolute; top: 7px; right: 7px; width: 6px; height: 6px; border-radius: 50%; }
  .card.known .card-status { background: var(--known-color); }
  .card.unknown .card-status { background: var(--unknown-color); }

  /* ── Overlay ── */
  #overlay {
    position: fixed; inset: 0; z-index: 200;
    background: var(--overlay-bg);
    display: flex; align-items: center; justify-content: center;
    padding: 28px 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.22s ease;
    backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
  }
  #overlay.visible { opacity: 1; pointer-events: all; }

  #modal {
    background: var(--paper); border: 1px solid var(--border-dark);
    border-radius: 20px; width: 100%; max-width: 460px;
    padding: 32px 28px 24px;
    box-shadow: 0 28px 72px var(--shadow);
    transform: scale(0.92) translateY(14px);
    transition: transform 0.3s cubic-bezier(0.34, 1.5, 0.64, 1);
  }
  #overlay.visible #modal { transform: scale(1) translateY(0); }

  #modal-word {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 38px; font-weight: 600;
    color: var(--text); line-height: 1.1; margin-bottom: 4px;
  }
  #modal-phonetic { font-size: 14px; color: var(--accent-light); font-style: italic; margin-bottom: 20px; }
  .modal-divider { height: 1px; background: var(--border); margin: 0 -28px 16px; }
  #modal-pos { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 7px; }
  #modal-en { font-size: 15px; color: var(--text-mid); font-style: italic; line-height: 1.6; margin-bottom: 12px; }
  #modal-zh { font-size: 28px; color: var(--text); font-weight: 300; line-height: 1.3; margin-bottom: 24px; }

  #modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .action-btn {
    padding: 11px; border-radius: 10px; border: 1px solid;
    font-family: inherit; font-size: 13px; cursor: pointer;
    transition: all 0.14s; -webkit-appearance: none;
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .action-btn:active { transform: scale(0.97); }
  #btn-known { background: var(--known-bg); border-color: var(--border-known); color: var(--known-color); }
  #btn-unknown { background: #faf0f0; border-color: var(--border-unknown); color: var(--unknown-color); }
  #btn-close { grid-column: 1 / -1; background: transparent; border-color: var(--border); color: var(--text-muted); font-size: 12px; }

  #grid-container::-webkit-scrollbar { width: 3px; }
  #grid-container::-webkit-scrollbar-track { background: transparent; }
  #grid-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div id="header">
  <h1>The Last Three Minutes — Preface</h1>
  <button class="hdr-btn" id="btn-word-only">仅英文</button>
  <button class="hdr-btn" id="btn-shuffle">随机排列</button>
</div>

<div id="filters">
  <button class="filter-btn active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="unknown">待复习</button>
  <button class="filter-btn" data-filter="known">已掌握</button>
  <button class="filter-btn" data-filter="fresh">未标记</button>
</div>

<div id="stats-row">
  <span class="stat-item"><span class="stat-dot dot-known"></span><span id="cnt-known">0</span> 已掌握</span>
  <span class="stat-item"><span class="stat-dot dot-unknown"></span><span id="cnt-unknown">0</span> 待复习</span>
  <span class="stat-item"><span class="stat-dot dot-fresh"></span><span id="cnt-fresh">0</span> 未标记</span>
</div>

<div id="grid-container"><div id="grid"></div></div>

<div id="overlay">
  <div id="modal">
    <div id="modal-word"></div>
    <div id="modal-phonetic"></div>
    <div class="modal-divider"></div>
    <div id="modal-pos"></div>
    <div id="modal-en"></div>
    <div id="modal-zh"></div>
    <div id="modal-actions">
      <button class="action-btn" id="btn-known">✓ 已掌握</button>
      <button class="action-btn" id="btn-unknown">✗ 待复习</button>
      <button class="action-btn" id="btn-close">关闭</button>
    </div>
  </div>
</div>

  const saved = localStorage.getItem('tlm_cards_state');
  if (saved) Object.assign(state, JSON.parse(saved));
} catch(e) {}

function saveState() {
  try { localStorage.setItem('tlm_cards_state', JSON.stringify(state)); } catch(e) {}
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateStats() {
  const vals = Object.values(state);
  document.getElementById('cnt-known').textContent = vals.filter(v => v === 'known').length;
  document.getElementById('cnt-unknown').textContent = vals.filter(v => v === 'unknown').length;
  document.getElementById('cnt-fresh').textContent = vals.filter(v => v === 'fresh').length;
}

function getFiltered() {
  if (currentFilter === 'all') return displayOrder;
  return displayOrder.filter(w => state[w.word] === currentFilter);
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  getFiltered().forEach(w => {
    const s = state[w.word];
    const card = document.createElement('div');
    card.className = 'card' + (s !== 'fresh' ? ' ' + s : '');
    card.innerHTML = `
      ${s !== 'fresh' ? '<div class="card-status"></div>' : ''}
      <div class="card-word">${w.word}</div>
      <div class="card-bottom">
        <div class="card-pos">${w.pos}</div>
        <div class="card-zh">${w.zh_def}</div>
      </div>
    `;
    card.addEventListener('click', () => openModal(w));
    grid.appendChild(card);
  });
  updateStats();
}

function speak(word) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.lang = 'en-US'; u.rate = 0.85;
    window.speechSynthesis.speak(u);
  }
}

function openModal(w) {
  currentWord = w;
  document.getElementById('modal-word').textContent = w.word;
  document.getElementById('modal-phonetic').textContent = w.phonetic;
  document.getElementById('modal-pos').textContent = w.pos;
  document.getElementById('modal-en').textContent = w.en_def;
  document.getElementById('modal-zh').textContent = w.zh_def;
  const s = state[w.word];
  document.getElementById('btn-known').textContent = s === 'known' ? '✓ 已掌握（取消）' : '✓ 已掌握';
  document.getElementById('btn-unknown').textContent = s === 'unknown' ? '✗ 待复习（取消）' : '✗ 待复习';
  document.getElementById('overlay').classList.add('visible');
  speak(w.word);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('visible');
  currentWord = null;
}

// ── Filter buttons ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGrid();
  });
});

// ── Shuffle ──
document.getElementById('btn-shuffle').addEventListener('click', () => {
  displayOrder = shuffle(displayOrder);
  renderGrid();
  document.getElementById('grid-container').scrollTop = 0;
});

// ── Word-only mode ──
document.getElementById('btn-word-only').addEventListener('click', () => {
  wordOnlyMode = !wordOnlyMode;
  document.body.classList.toggle('word-only', wordOnlyMode);
  document.getElementById('btn-word-only').classList.toggle('active', wordOnlyMode);
});

// ── Modal buttons ──
document.getElementById('btn-known').addEventListener('click', () => {
  if (!currentWord) return;
  state[currentWord.word] = state[currentWord.word] === 'known' ? 'fresh' : 'known';
  saveState(); renderGrid(); closeModal();
});
document.getElementById('btn-unknown').addEventListener('click', () => {
  if (!currentWord) return;
  state[currentWord.word] = state[currentWord.word] === 'unknown' ? 'fresh' : 'unknown';
  saveState(); renderGrid(); closeModal();
});
document.getElementById('btn-close').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && document.getElementById('overlay').classList.contains('visible')) {
    e.preventDefault(); closeModal();
  }
});

renderGrid();
</script>
</body>
</html>
